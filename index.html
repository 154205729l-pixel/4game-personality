<script>
(function(){
  const icons=['🎮','🕹️','🗡️','🛡️','💎','🧪','🔮','🎯','🏹','👾','🎲','🃏','⚔️','🏆','💰','🗝️','🧭','🔥','❤️','⭐','🌟','💀','🐉','🦊','🎪','🎃','🪄','👑','🎖️','⚡'];
  const container=document.getElementById('bgParticles');
  for(let i=0;i<25;i++){
    const span=document.createElement('span');
    span.className='bg-particle';
    span.textContent=icons[Math.floor(Math.random()*icons.length)];
    span.style.left=Math.random()*100+'%';
    span.style.fontSize=(16+Math.random()*20)+'px';
    span.style.opacity=0.04+Math.random()*0.08;
    span.style.animationDuration=(12+Math.random()*18)+'s';
    span.style.animationDelay=(-Math.random()*20)+'s';
    container.appendChild(span);
  }
})();
</script>

  };

  RewardVideoBridge.prototype.getBridge = function (callback) {
    var self = this;
    var done = false;
    var timer;

    ensureBridgeConnector();

    timer = setTimeout(function () {
      if (done) return;
      done = true;
      callback(new Error("未检测到 WebViewJavascriptBridge"));
    }, this.options.bridgeTimeout);

    root.connectWebViewJavascriptBridge(function (bridge) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      if (bridge && bridge.callHandler) {
        self.log("bridge ready");
        callback(null, bridge);
      } else {
        callback(new Error("桥对象存在，但没有 callHandler 方法"));
      }
    });
  };

  RewardVideoBridge.prototype.callHandler = function (name, params, callback) {
    var self = this;
    var cb = isFunction(callback) ? callback : function () {};

    this.log("callHandler: " + name, params);
    this.getBridge(function (bridgeError, bridge) {
      var done;
      var timer;

      if (bridgeError) {
        self.log(name + " bridge error", { message: bridgeError.message });
        cb(bridgeError);
        return;
      }

      done = false;
      timer = setTimeout(function () {
        if (done) return;
        done = true;
        self.log(name + " callback timeout");
        cb(null, null, { timeout: true });
      }, self.options.callbackTimeout);

      try {
        bridge.callHandler(name, params || {}, function (response) {
          if (done) return;
          done = true;
          clearTimeout(timer);
          self.log(name + " callback", response);
          cb(null, response, { timeout: false });
        });
      } catch (error) {
        if (done) return;
        done = true;
        clearTimeout(timer);
        self.log(name + " call error", { message: error.message });
        cb(error);
      }
    });
  };

  RewardVideoBridge.prototype.detectBridge = function (callback) {
    this.getBridge(function (error) {
      if (isFunction(callback)) callback(error || null);
    });
  };

  RewardVideoBridge.prototype.buildDefaultPayload = function (options) {
    var opts = extend({}, this.options, options || {});
    if (!opts.sdkId && !opts.sdk_id) {
      throw new Error("缺少 sdkId，无法请求激励视频广告位");
    }
    return {
      origin: opts.origin || "",
      sdk_id: opts.sdk_id || opts.sdkId,
      imp_mon_arr: opts.imp_mon_arr || opts.impMonArr || [],
      click_mon_arr: opts.click_mon_arr || opts.clickMonArr || [],
      ct: opts.ct || "",
      pgid: opts.pgid || this.options.pgid
    };
  };

  RewardVideoBridge.prototype.setPayload = function (payload) {
    this.currentPayload = extend({}, payload || {});
    return this.currentPayload;
  };

  RewardVideoBridge.prototype.getPayload = function () {
    return this.currentPayload;
  };

  RewardVideoBridge.prototype.preloadPayload = function (payload, callback) {
    var finalPayload = this.setPayload(payload);
    this.callHandler("preLoadVideo", finalPayload, callback);
  };

  RewardVideoBridge.prototype.preload = function (options, callback) {
    var payload;
    var cb = callback;
    if (isFunction(options)) {
      cb = options;
      options = {};
    }

    try {
      payload = this.buildDefaultPayload(options);
    } catch (error) {
      if (isFunction(cb)) cb(toError(error));
      return;
    }

    this.preloadPayload(payload, cb);
  };

  RewardVideoBridge.prototype.loadFromConfig = function (options, callback) {
    var self = this;
    var opts = options || {};
    var cb = callback;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    this.callHandler("adRequest", {
      method: "get",
      url: opts.adUrl || this.options.adUrl,
      param: {
        pgid: opts.pgid || this.options.pgid
      }
    }, function (error, response) {
      var body;
      var ad;
      var payload;

      if (error) {
        if (isFunction(cb)) cb(error);
        return;
      }

      body = unwrapNativeResponse(response);
      self.log("adRequest unwrapped", body);
      ad = findRewardAd(body);
      if (!ad) {
        if (isFunction(cb)) cb(new Error("adRequest 没找到 ad_type=sdk_rewarded_video 的广告"));
        return;
      }

      payload = {
        origin: ad.ad_source && ad.ad_source.sdk_origin,
        sdk_id: ad.ad_source && ad.ad_source.sdk_position_id,
        imp_mon_arr: ad.imp_mon_arr || [],
        click_mon_arr: ad.click_mon_arr || [],
        ct: "",
        pgid: opts.pgid || self.options.pgid
      };

      if (!payload.sdk_id) {
        if (isFunction(cb)) cb(new Error("广告配置里没有 ad_source.sdk_position_id"));
        return;
      }

      self.preloadPayload(payload, function (preloadError, preloadResponse, meta) {
        if (isFunction(cb)) cb(preloadError || null, payload, preloadResponse, meta);
      });
    });
  };

  RewardVideoBridge.prototype.show = function (options, callback) {
    var opts = options || {};
    var cb = callback;
    var base;
    var payload;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    try {
      base = this.currentPayload || this.buildDefaultPayload(opts);
      payload = extend({
        id: opts.id || opts.sceneId || this.options.sceneId,
        data: opts.data || this.options.data || {}
      }, base);
    } catch (error) {
      if (isFunction(cb)) cb(toError(error));
      return;
    }

    this.callHandler("connectVideo", payload, cb);
  };

  RewardVideoBridge.prototype.preloadThenShow = function (options, callback) {
    var self = this;
    var opts = options || {};
    var cb = callback;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    this.preload(opts, function (error) {
      if (error) {
        if (isFunction(cb)) cb(error);
        return;
      }
      self.show(opts, cb);
    });
  };

  RewardVideoBridge.prototype.loadFromConfigThenShow = function (options, callback) {
    var self = this;
    var opts = options || {};
    var cb = callback;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    this.loadFromConfig(opts, function (error) {
      if (error) {
        if (isFunction(cb)) cb(error);
        return;
      }
      self.show(opts, cb);
    });
  };

  root.RewardVideoBridge = {
    create: function (options) {
      return new RewardVideoBridge(options);
    },
    Constructor: RewardVideoBridge
  };
})(window);

{name:'速通达人',emoji:'⚡',tag:'SPEEDRUNNER',slogan:'更快，更快，还能更快',traits:['追求极限','技术流','不走寻常路','帧数精确'],desc:'你是游戏里的时间魔法师，别人花几十小时的游戏你几小时就能通关。你熟知每一个跳过技巧和加速方法，每一帧都经过精密计算。打破记录是你永恒的追求。',quote:'"时间就是一切，每一帧都不能浪费。"',quoteAttr:'—— 速通社区格言',celebs:[{emoji:'⏱️',name:'世界纪录保持者'},{emoji:'🐛',name:'BUG猎人'},{emoji:'🚀',name:'序列破坏者'}],compat:[{i:4,pct:90},{i:0,pct:88},{i:3,pct:78}],stats:['平台跳跃','动作游戏','魂系游戏','独立游戏'],games:'空洞骑士 / 蔚蓝 / 超级马里奥 / 只狼'}
];
const DIM_NAMES=['战斗','探索','社交','成就','策略','创造','剧情','休闲','速通'];
let cur=0,answered=false,scores=new Array(9).fill(0);
let rewardAd=null,rewardAdInited=false,rewardAdLoading=false,rewardAdSessionId=0;
let rewardAdUnlockTimer=null,rewardAdLaunchFallbackTimer=null,rewardAdProgressTimer=null;
let rewardAdWatchStartedAt=0,rewardAdWatchDelay=8000;
const rewardAdLogPrefix='[game-personality-reward]';
function startQuiz(){cur=0;scores=new Array(9).fill(0);show('quiz');renderQ()}
function show(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function renderQ(){
  answered=false;const q=Q[cur];
  document.getElementById('progressFill').style.width=((cur/Q.length)*100)+'%';
  document.getElementById('quizCount').textContent=(cur+1)+' / '+Q.length;
  document.getElementById('quizQuestion').textContent=q.q;
  const w=document.getElementById('quizOptions');w.innerHTML='';
  q.opts.forEach((o,i)=>{const d=document.createElement('div');d.className='quiz-option';d.textContent=o.text;d.onclick=()=>selectOpt(i);w.appendChild(d)});
}
function selectOpt(i){
  if(answered)return;answered=true;
  document.querySelectorAll('.quiz-option')[i].classList.add('selected');
  Q[cur].opts[i].s.forEach((v,j)=>scores[j]+=v);
  setTimeout(()=>{cur++;cur<Q.length?renderQ():showResult()},350);
}
function showResult(){
  show('result');
  const max=Math.max(...scores),ti=scores.indexOf(max);
  const total=scores.reduce((a,b)=>a+b,0);
  const matchPct=Math.min(99,Math.round(60+max/total*40*3));
  const t=TYPES[ti];
  // sorted types by score
  const sorted=scores.map((s,i)=>({s,i})).sort((a,b)=>b.s-a.s);
  const top3=sorted.slice(0,3);
  const el=document.getElementById('result');
  el.className='section active type-'+ti;
  el.innerHTML=`
    <div class="result-card">
      <div class="result-match">${matchPct}%</div>
      <div class="result-match-label">人格匹配度</div>
      <div class="result-avatar">${t.emoji}</div>
      <div class="result-tag">${t.tag}</div>
      <div class="result-name">${t.name}</div>
      <div class="result-slogan">${t.slogan}</div>
      <div class="traits-wrap">${t.traits.map(x=>`<span class="trait-tag">${x}</span>`).join('')}</div>
      <div class="radar-wrap"><canvas id="radarCanvas" width="220" height="220"></canvas></div>
      <div class="top3-section">${top3.map((x,i)=>{
        const pct=Math.round(x.s/total*100);
        const colors=['var(--c1)','rgba(255,255,255,.4)','rgba(255,255,255,.25)'];
        return `<div class="top3-item"><div class="top3-rank">${['🥇','🥈','🥉'][i]}</div><div class="top3-info"><div class="top3-name">${TYPES[x.i].emoji} ${TYPES[x.i].name}</div><div class="top3-bar"><div class="top3-fill" style="width:${pct}%;background:${colors[i]}"></div></div></div><div class="top3-pct">${pct}%</div></div>`;
      }).join('')}</div>
      <button class="btn-unlock" id="rewardUnlockBtn" onclick="showAd()">🔓 查看激励视频解锁深度解析</button>
      <button class="btn-share" onclick="share()">📤 分享给朋友</button>
      <button class="btn-retry" onclick="retry()">重新测试</button>
    </div>
    <div class="analysis-section" id="analysisSection" style="display:none">
      <div class="quote-box"><div class="quote-text">${t.quote}</div><div class="quote-attr">${t.quoteAttr}</div></div>
      <div class="analysis-card"><h3>🔍 深度解析</h3><p>${t.desc}</p></div>
      <div class="analysis-card"><h3>🎮 推荐游戏类型</h3><p>${t.stats.join(' · ')}</p><p style="margin-top:8px;font-size:12px;color:rgba(255,255,255,.5)">代表作：${t.games}</p></div>
      <div class="analysis-card"><h3>🌟 同类名人堂</h3><div class="celeb-list">${t.celebs.map(c=>`<div class="celeb-item"><div class="celeb-avatar">${c.emoji}</div><div class="celeb-name">${c.name}</div></div>`).join('')}</div></div>
      <div class="analysis-card"><h3>💞 人格相性</h3><div class="compat-grid">${t.compat.map(c=>`<div class="compat-item"><div class="compat-emoji">${TYPES[c.i].emoji}</div><div class="compat-label">${TYPES[c.i].name}</div><div class="compat-pct" style="color:var(--c1)">${c.pct}%</div></div>`).join('')}</div></div>
      <div class="analysis-card"><h3>📊 九维能力值</h3>${DIM_NAMES.map((n,i)=>{const pct=total?Math.round(scores[i]/total*100):0;return `<div class="stat-row"><span class="stat-label">${n}</span><div class="stat-stars">${'★'.repeat(Math.max(1,Math.round(scores[i]/max*5)))}${'☆'.repeat(5-Math.max(1,Math.round(scores[i]/max*5)))}</div></div>`;}).join('')}</div>
      <div class="analysis-card"><h3>💡 游戏建议</h3><p>作为「${t.name}」，你最适合${t.stats[0]}和${t.stats[1]}类型。试试和「${TYPES[t.compat[0].i].name}」类型的朋友组队，你们的配合度高达${t.compat[0].pct}%！</p></div>
      <button class="btn-retry" onclick="retry()">重新测试</button>
    </div>`;
  setTimeout(()=>drawRadar(scores,ti),100);
  // scroll hint
  const hint=document.createElement('div');hint.className='scroll-hint';hint.innerHTML='向下滑动查看完整报告<span class="arrow">↓</span>';document.body.appendChild(hint);
  setTimeout(()=>{hint.style.opacity='0';setTimeout(()=>hint.remove(),500)},3000);
  window.addEventListener('scroll',function onScroll(){hint.style.opacity='0';setTimeout(()=>hint.remove(),500);window.removeEventListener('scroll',onScroll)},{once:true});
}
function drawRadar(sc,ti){
  const cv=document.getElementById('radarCanvas');if(!cv)return;
  const ctx=cv.getContext('2d'),cx=110,cy=110,r=80,n=9;
  const max=Math.max(...sc)||1;
  ctx.clearRect(0,0,220,220);
  // grid
  for(let lv=1;lv<=3;lv++){
    ctx.beginPath();
    for(let i=0;i<=n;i++){const a=Math.PI*2/n*i-Math.PI/2;ctx.lineTo(cx+r*lv/3*Math.cos(a),cy+r*lv/3*Math.sin(a))}
    ctx.closePath();ctx.strokeStyle='rgba(255,255,255,.1)';ctx.stroke();
  }
  // axes + labels
  const style=getComputedStyle(document.getElementById('result'));
  const c1=style.getPropertyValue('--c1').trim()||'#667eea';
  for(let i=0;i<n;i++){
    const a=Math.PI*2/n*i-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));ctx.strokeStyle='rgba(255,255,255,.08)';ctx.stroke();
    const lx=cx+(r+16)*Math.cos(a),ly=cy+(r+16)*Math.sin(a);
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(DIM_NAMES[i],lx,ly);
  }
  // data
  ctx.beginPath();
  for(let i=0;i<=n;i++){const idx=i%n;const a=Math.PI*2/n*idx-Math.PI/2;const v=sc[idx]/max;ctx.lineTo(cx+r*v*Math.cos(a),cy+r*v*Math.sin(a))}
  ctx.closePath();ctx.fillStyle=c1.replace(')',',0.2)').replace('rgb','rgba');ctx.fill();ctx.strokeStyle=c1;ctx.lineWidth=2;ctx.stroke();
  // dots
  for(let i=0;i<n;i++){const a=Math.PI*2/n*i-Math.PI/2;const v=sc[i]/max;ctx.beginPath();ctx.arc(cx+r*v*Math.cos(a),cy+r*v*Math.sin(a),3,0,Math.PI*2);ctx.fillStyle=c1;ctx.fill()}
}
function logRewardAd(title,data){
  if(window.console&&console.log)console.log(rewardAdLogPrefix,title,data||'');
}
function initRewardAd(){
  if(rewardAdInited)return !!rewardAd;
  rewardAdInited=true;
  if(!window.RewardVideoBridge){
    toast('激励视频组件加载失败');
    logRewardAd('RewardVideoBridge missing');
    return false;
  }
  rewardAd=RewardVideoBridge.create({
    origin:'tobid',
    sdkId:'6362731749334746',
    sceneId:'leagueCollect_14',
    pgid:'1.15.2',
    callbackTimeout:8000,
    data:{from:'game-personality',reward:'unlock_analysis'},
    onLog:logRewardAd
  });
  rewardAd.detectBridge(error=>{
    if(error){logRewardAd('bridge detect failed',{message:error.message});return}
    logRewardAd('bridge detected');
  });
  return true;
}
function preloadRewardAd(silent){
  if(!rewardAd&&!initRewardAd())return;
  rewardAd.preload((error,response,meta)=>{
    if(error){
      logRewardAd('preload failed',{message:error.message});
      if(!silent)toast('激励视频预加载失败，请稍后再试');
      return;
    }
    logRewardAd('preload called',{response,meta});
  });
}
function setUnlockButtonLoading(loading){
  const btn=document.getElementById('rewardUnlockBtn');
  if(!btn)return;
  btn.disabled=loading;
  btn.textContent=loading?'正在打开激励视频':'🔓 查看激励视频解锁深度解析';
}
function showRewardAdOverlay(title,desc){
  const ov=document.getElementById('adOverlay');
  const fill=document.getElementById('adProgressFill');
  document.getElementById('adTitle').innerHTML=title;
  document.getElementById('adTimer').textContent=desc;
  document.getElementById('adCloseBtn').style.display='inline-block';
  fill.style.width='0';
  ov.classList.add('active');
}
function clearRewardAdTimers(){
  if(rewardAdUnlockTimer){clearTimeout(rewardAdUnlockTimer);rewardAdUnlockTimer=null}
  if(rewardAdLaunchFallbackTimer){clearTimeout(rewardAdLaunchFallbackTimer);rewardAdLaunchFallbackTimer=null}
  if(rewardAdProgressTimer){clearInterval(rewardAdProgressTimer);rewardAdProgressTimer=null}
}
function resetRewardAdWaiting(message){
  rewardAdSessionId++;
  rewardAdLoading=false;
  rewardAdWatchStartedAt=0;
  clearRewardAdTimers();
  document.getElementById('adOverlay').classList.remove('active');
  setUnlockButtonLoading(false);
  if(message)toast(message);
  setTimeout(()=>preloadRewardAd(true),500);
}
function unlockAnalysis(){
  const section=document.getElementById('analysisSection');
  if(!section)return;
  section.style.display='block';
  section.scrollIntoView({behavior:'smooth'});
}
function completeRewardAdUnlock(sessionId,reason,response){
  if(sessionId!==rewardAdSessionId||!rewardAdLoading)return;
  rewardAdLoading=false;
  rewardAdWatchStartedAt=0;
  clearRewardAdTimers();
  document.getElementById('adOverlay').classList.remove('active');
  setUnlockButtonLoading(false);
  logRewardAd('unlock analysis',{reason,response:response||null});
  toast('广告观看完成，正在打开深度解析');
  unlockAnalysis();
  setTimeout(()=>preloadRewardAd(true),800);
}
function startRewardAdUnlockTimer(sessionId,reason){
  if(sessionId!==rewardAdSessionId||!rewardAdLoading||rewardAdUnlockTimer)return;
  const fill=document.getElementById('adProgressFill');
  let left=rewardAdWatchDelay/1000;
  rewardAdWatchStartedAt=Date.now();
  fill.style.width='0';
  document.getElementById('adTitle').innerHTML='激励视频播放中';
  document.getElementById('adTimer').textContent='8 秒后自动解锁深度解析';
  logRewardAd('start 8s unlock timer',{reason});
  rewardAdProgressTimer=setInterval(()=>{
    const elapsed=Date.now()-rewardAdWatchStartedAt;
    const pct=Math.min(100,elapsed/rewardAdWatchDelay*100);
    fill.style.width=pct+'%';
    left=Math.max(0,Math.ceil((rewardAdWatchDelay-elapsed)/1000));
    document.getElementById('adTimer').textContent=left>0?left+' 秒后自动解锁深度解析':'正在解锁深度解析';
  },300);
  rewardAdUnlockTimer=setTimeout(()=>completeRewardAdUnlock(sessionId,reason||'8s auto unlock'),rewardAdWatchDelay);
}
function handleRewardAdPageLeave(){
  if(!rewardAdLoading)return;
  startRewardAdUnlockTimer(rewardAdSessionId,'page leave');
}
function handleRewardAdPageReturn(){
  if(!rewardAdLoading||!rewardAdWatchStartedAt)return;
  if(Date.now()-rewardAdWatchStartedAt<rewardAdWatchDelay){
    logRewardAd('return before 8s, reset reward state');
    resetRewardAdWaiting('广告未观看满 8 秒，请重新观看');
  }
}
function showAd(){
  let sessionId;
  if(rewardAdLoading)return;
  if(!rewardAd&&!initRewardAd())return;
  clearRewardAdTimers();
  rewardAdSessionId++;
  sessionId=rewardAdSessionId;
  rewardAdWatchStartedAt=0;
  rewardAdLoading=true;
  setUnlockButtonLoading(true);
  showRewardAdOverlay('正在拉起激励视频','进入广告后 8 秒自动解锁深度解析');
  preloadRewardAd(true);
  setTimeout(()=>{
    if(sessionId!==rewardAdSessionId||!rewardAdLoading)return;
    rewardAd.show({
      data:{from:'game-personality',reward:'unlock_analysis'}
    },(error,response,meta)=>{
      if(sessionId!==rewardAdSessionId||!rewardAdLoading)return;
      if(error){
        logRewardAd('show failed',{message:error.message});
        resetRewardAdWaiting();
        toast('激励视频展示失败，请稍后再试');
        return;
      }
      if(meta&&meta.timeout){
        logRewardAd('show callback timeout, unlock by 8s fallback');
        completeRewardAdUnlock(sessionId,'connectVideo 8s timeout',response);
        return;
      }
      logRewardAd('connectVideo callback received',response);
      startRewardAdUnlockTimer(sessionId,'connectVideo callback');
    });
    rewardAdLaunchFallbackTimer=setTimeout(()=>startRewardAdUnlockTimer(sessionId,'launch fallback'),1200);
  },300);
}
function closeAd(){
  resetRewardAdWaiting('已取消等待，可重新点击观看');
}
document.addEventListener('visibilitychange',()=>{
  if(document.hidden)handleRewardAdPageLeave();
  else handleRewardAdPageReturn();
});
window.addEventListener('pagehide',handleRewardAdPageLeave);
window.addEventListener('pageshow',handleRewardAdPageReturn);
window.addEventListener('blur',handleRewardAdPageLeave);
window.addEventListener('focus',handleRewardAdPageReturn);
function share(){
  const txt=document.querySelector('.result-name')?.textContent||'';
  if(navigator.share){navigator.share({title:'我的游戏人格：'+txt,text:'我是「'+txt+'」！快来测测你是哪种游戏人格？',url:location.href}).catch(()=>{})}
  else{navigator.clipboard?.writeText('我是「'+txt+'」！快来测测你是哪种游戏人格→ '+location.href).then(()=>toast('已复制到剪贴板')).catch(()=>toast('分享链接复制失败'))}
}
function retry(){resetRewardAdWaiting();show('home')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
preloadRewardAd(true);
</script>
